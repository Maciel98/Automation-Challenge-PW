  name: Deploy Allure Report (Manual)

  on:
    workflow_dispatch:

  permissions:
    pages: write
    id-token: write
    contents: read

  concurrency:
    group: pages
    cancel-in-progress: false

  jobs:
    deploy:
      runs-on: ubuntu-latest
      timeout-minutes: 10

      steps:
        - name: Checkout
          uses: actions/checkout@v4

        - name: Setup Node.js
          uses: actions/setup-node@v4
          with:
            node-version: lts/*

        - name: Download Allure Results
          uses: actions/download-artifact@v4
          with:
            pattern: '*-allure-results'
            path: allure-results/
            merge-multiple: true

        - name: Verify Download
          run: |
            echo "Files downloaded:"
            ls -la
            if [ -d "allure-results" ]; then
              echo "Allure results found:"
              ls -la allure-results/ | head -20
              echo "Total files: $(find allure-results -type f | wc -l)"
            else
              echo "ERROR: No allure-results directory!"
              exit 1
            fi

        - name: Install Allure CLI
          run: |
            npm install -g allure-commandline
            allure --version

        - name: Generate Report
          run: |
            echo "Generating Allure report..."
            allure generate allure-results --clean -o allure-report
            echo "Report generated successfully"
            ls -la allure-report/

        - name: Setup Pages
          uses: actions/configure-pages@v4

        - name: Upload to Pages
          uses: actions/upload-pages-artifact@v3
          with:
            path: ./allure-report

        - name: Deploy to GitHub Pages
          uses: actions/deploy-pages@v4

        - name: Done
          run: |
            echo "🎉 Allure report deployed!"
            echo "📊 Dashboard: https://maciel98.github.io/Automation-Challenge-PW/"
            echo "⏳ Wait 1-2 minutes for GitHub Pages to update"
