# =============================================================================
# CI/CD Pipeline for SauceDemo E2E Tests
# =============================================================================
# This pipeline implements a three-environment quality gate strategy:
# - DEV: Smoke tests on every PR/push (fast feedback, blocking gate)
# - TEST: Smoke + full regression on staging merge (comprehensive validation)
# - PRD: Smoke tests only on production release (health check, never regression)
#
# KEY PRINCIPLES:
# • Smoke tests are deployment health checks (run in all environments)
# • Regression tests are quality gates (TEST environment only)
# • PRD failure triggers rollback, not debugging
# =============================================================================

name: E2E Test Pipeline

# =============================================================================
# PERMISSIONS
# =============================================================================
# Required for creating issues on test failures and deploying to GitHub Pages
# =============================================================================
permissions:
  issues: write
  contents: read
  pages: write
  id-token: write

# =============================================================================
# TRIGGERS
# =============================================================================
# Pipeline runs on:
# - Push to any branch (triggers smoke-dev)
# - Pull requests to main/develop (triggers smoke-dev)
# - Push to test branch (triggers test-stage) (smoke and full regression on test)
# - Push to main branch (triggers smoke-prd)
# - Nightly schedule at 2 AM (triggers nightly-regression)
# =============================================================================
on:
  push:
    branches: ['**']  # Triggers smoke-dev and smoke-prd if main
  pull_request:
    branches: [main, develop]  # Triggers smoke-dev
  schedule:
    # Run nightly regression at 2 AM UTC
    - cron: '0 4 * * *'  # Triggers nightly-regression (UTC-3 is at 1am)
  workflow_dispatch:  # Allows manual triggering of the workflow from GitHub UI

# =============================================================================
# ENVIRONMENT CONFIGURATION
# =============================================================================
# Base URL configuration is in playwright.config.ts projects:
# - dev:   baseURL = https://dev.saucedemo.com
# - test:  baseURL = https://test.saucedemo.com
# - prd:   baseURL = https://www.saucedemo.com
# =============================================================================

jobs:
  # ===========================================================================
  # JOB 1: SMOKE DEV
  # ===========================================================================
  # PURPOSE: Fast feedback on every PR/push to prevent broken code promotion
  # TRIGGER: Every push or pull request
  # SCOPE: Smoke tests only (critical path validation)
  # GATE: BLOCKING - if smoke fails, do NOT promote to TEST
  # ===========================================================================
  smoke-dev:
    name: 🚪 Smoke Tests - DEV Environment
    runs-on: ubuntu-latest
    timeout-minutes: 15  # Fast feedback, fail quickly

    # Run on all PRs and pushes
    if: github.event_name == 'pull_request' || github.event_name == 'push'

    steps:
      # -------------------------------------------------------------------------
      # STEP 1: Checkout code
      # -------------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # STEP 2: Setup Node.js
      # -------------------------------------------------------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*  # Use latest LTS for stability

      # -------------------------------------------------------------------------
      # STEP 3: Install dependencies
      # -------------------------------------------------------------------------
      - name: 📦 Install Dependencies
        run: npm ci  # Clean install for CI consistency

      # -------------------------------------------------------------------------
      # STEP 4: Install Playwright browsers
      # -------------------------------------------------------------------------
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # -------------------------------------------------------------------------
      # STEP 5: Run smoke tests on DEV
      # -------------------------------------------------------------------------
      # Smoke tests verify:
      # • Login page loads and authentication works
      # • Inventory page displays products
      # • Add to cart functionality works
      # • Basic navigation is functional
      #
      # Uses @smoke tag - tests are tagged in their spec files, not duplicated
      # -------------------------------------------------------------------------
      - name: 🧪 Run Smoke Tests (DEV)
        run: npx playwright test --grep @smoke --project=dev
        env:
          CI: true
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      # -------------------------------------------------------------------------
      # STEP 6: Upload HTML report (always, even on failure)
      # -------------------------------------------------------------------------
      - name: 📊 Upload HTML Report
        if: always()  # Upload even if tests fail
        uses: actions/upload-artifact@v4
        with:
          name: smoke-dev-html-report
          path: playwright-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 6.5: Upload Allure results (always, even on failure)
      # -------------------------------------------------------------------------
      - name: 📈 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-dev-allure-results
          path: allure-results/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 6.6: Generate Allure Report
      # -------------------------------------------------------------------------
      - name: 📈 Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      # -------------------------------------------------------------------------
      # STEP 6.7: Upload Allure Report
      # -------------------------------------------------------------------------
      - name: 📊 Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-dev-allure-report
          path: allure-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 7: Upload trace files for debugging failures
      # -------------------------------------------------------------------------
      - name: 🐛 Upload Trace Files
        if: failure()  # Only upload on failure
        uses: actions/upload-artifact@v4
        with:
          name: smoke-dev-trace-files
          path: test-results/
          retention-days: 7

  # ===========================================================================
  # JOB 2: TEST STAGE
  # ===========================================================================
  # PURPOSE: Comprehensive validation in TEST environment before production
  # TRIGGER: Merge/push to test branch
  # SCOPE: Smoke first (gate), then full regression suite
  # GATE: BLOCKING - both smoke and regression must pass to promote to PRD
  # ===========================================================================
  test-stage:
    name: 🧪 Full Test Suite - TEST Environment
    runs-on: ubuntu-latest
    timeout-minutes: 60  # Allow time for full regression

    # Only run on test branch
    if: github.ref == 'refs/heads/test'

    steps:
      # -------------------------------------------------------------------------
      # STEP 1: Checkout code
      # -------------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # STEP 2: Setup Node.js
      # -------------------------------------------------------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # -------------------------------------------------------------------------
      # STEP 3: Install dependencies
      # -------------------------------------------------------------------------
      - name: 📦 Install Dependencies
        run: npm ci

      # -------------------------------------------------------------------------
      # STEP 4: Install Playwright browsers
      # -------------------------------------------------------------------------
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # -------------------------------------------------------------------------
      # STEP 5: Run SMOKE tests on TEST (quality gate)
      # -------------------------------------------------------------------------
      # IMPORTANT: Smoke must pass before running regression
      # If smoke fails, we stop and do NOT run regression
      # This prevents wasting CI time on a broken environment
      # -------------------------------------------------------------------------
      - name: 🚪 Smoke Gate - Verify TEST Environment Health
        run: npx playwright test --grep @smoke --project=test
        env:
          CI: true
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      # -------------------------------------------------------------------------
      # STEP 6: Run REGRESSION tests on TEST
      # -------------------------------------------------------------------------
      # Only runs if smoke passes (GitHub Actions dependency)
      #
      # Regression suite includes:
      # • All smoke tests (already validated)
      # • All domain tests: auth, cart, checkout, inventory, navigation
      # • E2E critical paths
      # • Form validation tests
      # • Negative test scenarios
      #
      # CRITICAL: Regression NEVER runs against production
      # - Creates real test data (orders, cart state)
      # - Takes significantly longer
      # - Not a health check, it's a comprehensive validation
      # -------------------------------------------------------------------------
      - name: 🔄 Full Regression Suite
        run: npx playwright test --grep @regression --project=test
        env:
          CI: true
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      # -------------------------------------------------------------------------
      # STEP 7: Upload HTML report
      # -------------------------------------------------------------------------
      - name: 📊 Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-stage-html-report
          path: playwright-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 7.5: Upload Allure results (always, even on failure)
      # -------------------------------------------------------------------------
      - name: 📈 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-stage-allure-results
          path: allure-results/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 7.6: Generate Allure Report
      # -------------------------------------------------------------------------
      - name: 📈 Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      # -------------------------------------------------------------------------
      # STEP 7.7: Upload Allure Report
      # -------------------------------------------------------------------------
      - name: 📊 Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-stage-allure-report
          path: allure-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 8: Upload trace files
      # -------------------------------------------------------------------------
      - name: 🐛 Upload Trace Files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: test-stage-trace-files
          path: test-results/
          retention-days: 7

      # -------------------------------------------------------------------------
      # STEP 9: Create GitHub issue on failure (optional)
      # -------------------------------------------------------------------------
      # Automatically logs a bug when regression fails
      # This ensures test failures are tracked and investigated
      # -------------------------------------------------------------------------
      - name: 🐛 Create Issue on Failure
        if: failure()
        uses: actions/github-script@v7
        continue-on-error: true  # Don't fail the job if issue creation fails
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 Regression Test Failure - TEST Environment',
              body: 'Regression tests failed in TEST environment. **This blocks production deployment.**\n\n' +
                    '**Workflow:** ' + context.workflow + '\n' +
                    '**Run:** ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + '\n\n' +
                    'Please investigate and fix before deploying to production.',
              labels: ['bug', 'test-failure', 'blocking']
            })

  # ===========================================================================
  # JOB 3: SMOKE PRD
  # ===========================================================================
  # PURPOSE: Production health check after release
  # TRIGGER: Merge/push to main branch (after production deployment)
  # SCOPE: Smoke tests ONLY (never regression in production)
  # GATE: BLOCKING - smoke fail = ROLLBACK, not debugging
  # ===========================================================================
  smoke-prd:
    name: 🚪 Production Health Check - PRD Environment
    runs-on: ubuntu-latest
    timeout-minutes: 15

    # Only run on main branch (after production deployment)
    if: github.ref == 'refs/heads/main'

    steps:
      # -------------------------------------------------------------------------
      # STEP 1: Checkout code
      # -------------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # STEP 2: Setup Node.js
      # -------------------------------------------------------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # -------------------------------------------------------------------------
      # STEP 3: Install dependencies
      # -------------------------------------------------------------------------
      - name: 📦 Install Dependencies
        run: npm ci

      # -------------------------------------------------------------------------
      # STEP 4: Install Playwright browsers
      # -------------------------------------------------------------------------
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # -------------------------------------------------------------------------
      # STEP 5: Run SMOKE tests on PRD
      # -------------------------------------------------------------------------
      # CRITICAL: Only smoke tests run in production
      # Regression tests are NEVER run against production because:
      # • They create real orders/cart state
      # • They take too long
      # • Production failures require rollback, not test debugging
      #
      # If these smoke tests fail, the production deployment is broken
      # and should be rolled back immediately
      # -------------------------------------------------------------------------
      - name: 🚪 Production Smoke Tests
        run: npx playwright test --grep @smoke --project=prd
        env:
          CI: true
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      # -------------------------------------------------------------------------
      # STEP 6: Upload HTML report
      # -------------------------------------------------------------------------
      - name: 📊 Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prd-html-report
          path: playwright-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 6.5: Upload Allure results (always, even on failure)
      # -------------------------------------------------------------------------
      - name: 📈 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prd-allure-results
          path: allure-results/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 6.6: Generate Allure Report
      # -------------------------------------------------------------------------
      - name: 📈 Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      # -------------------------------------------------------------------------
      # STEP 6.7: Upload Allure Report
      # -------------------------------------------------------------------------
      - name: 📊 Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prd-allure-report
          path: allure-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 7: Upload trace files
      # -------------------------------------------------------------------------
      - name: 🐛 Upload Trace Files
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: smoke-prd-trace-files
          path: test-results/
          retention-days: 7

      # -------------------------------------------------------------------------
      # STEP 8: Rollback notification on failure
      # -------------------------------------------------------------------------
      # Production smoke test failure = ROLLBACK immediately
      # This notifies the team that production is broken
      # -------------------------------------------------------------------------
      - name: 🚨 Rollback Notification
        if: failure()
        uses: actions/github-script@v7
        continue-on-error: true  # Don't fail the job if issue creation fails
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🚨 PRODUCTION ROLLBACK REQUIRED - Smoke Tests Failed',
              body: '**URGENT:** Production smoke tests failed. **Rollback the production deployment immediately.**\n\n' +
                    '**Workflow:** ' + context.workflow + '\n' +
                    '**Run:** ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + '\n\n' +
                    'Do NOT debug in production. Rollback to previous stable version and investigate in TEST environment.',
              labels: ['urgent', 'production', 'rollback-required']
            })

  # ===========================================================================
  # JOB 4: NIGHTLY REGRESSION
  # ===========================================================================
  # PURPOSE: Catch regressions that may have developed between releases
  # TRIGGER: Scheduled run at 2 AM UTC daily OR manual workflow dispatch
  # SCOPE: @regression tagged tests in TEST environment
  # GATE: NON-BLOCKING - creates bug tickets but doesn't block deployment
  # ===========================================================================
  nightly-regression:
    name: 🌙 Nightly Regression - TEST Environment
    runs-on: ubuntu-latest
    timeout-minutes: 60

    # Run on scheduled trigger OR manual dispatch
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'

    steps:
      # -------------------------------------------------------------------------
      # STEP 1: Checkout code
      # -------------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # STEP 2: Setup Node.js
      # -------------------------------------------------------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # -------------------------------------------------------------------------
      # STEP 3: Install dependencies
      # -------------------------------------------------------------------------
      - name: 📦 Install Dependencies
        run: npm ci

      # -------------------------------------------------------------------------
      # STEP 4: Install Playwright browsers
      # -------------------------------------------------------------------------
      - name: 🎭 Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      # -------------------------------------------------------------------------
      # STEP 5: Run NIGHTLY REGRESSION tests on TEST
      # -------------------------------------------------------------------------
      # Runs all tests tagged with @regression
      # This is a non-blocking check - failures create bug tickets
      # but don't block ongoing development work
      # -------------------------------------------------------------------------
      - name: 🔍 Debug Environment Variables
        run: |
          echo "CI=$CI"
          echo "STANDARD_USER is set: $(if [ -n "$STANDARD_USER" ]; then echo 'YES'; else echo 'NO'; fi)"
          echo "LOCKED_OUT_USER is set: $(if [ -n "$LOCKED_OUT_USER" ]; then echo 'YES'; else echo 'NO'; fi)"
          echo "TEST_PASSWORD is set: $(if [ -n "$TEST_PASSWORD" ]; then echo 'YES'; else echo 'NO'; fi)"

      - name: 🌙 Nightly Regression Suite
        id: nightly-run
        run: npx playwright test --grep @regression --project=test
        continue-on-error: true  # Don't fail the workflow, just log bugs
        env:
          CI: true
          STANDARD_USER: ${{ secrets.STANDARD_USER }}
          LOCKED_OUT_USER: ${{ secrets.LOCKED_OUT_USER }}
          TEST_PASSWORD: ${{ secrets.TEST_PASSWORD }}

      # -------------------------------------------------------------------------
      # STEP 6: Upload HTML report
      # -------------------------------------------------------------------------
      - name: 📊 Upload HTML Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-html-report
          path: playwright-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 6.5: Upload Allure results (always, even on failure)
      # -------------------------------------------------------------------------
      - name: 📈 Upload Allure Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-allure-results
          path: allure-results/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 6.6: Generate Allure Report
      # -------------------------------------------------------------------------
      - name: 📈 Generate Allure Report
        if: always()
        run: |
          npm install -g allure-commandline
          allure generate allure-results --clean -o allure-report

      # -------------------------------------------------------------------------
      # STEP 6.7: Upload Allure Report
      # -------------------------------------------------------------------------
      - name: 📊 Upload Allure Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-allure-report
          path: allure-report/
          retention-days: 30

      # -------------------------------------------------------------------------
      # STEP 7: Upload trace files
      # -------------------------------------------------------------------------
      - name: 🐛 Upload Trace Files
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: nightly-regression-trace-files
          path: test-results/
          retention-days: 7

      # -------------------------------------------------------------------------
      # STEP 8: Create GitHub issue on failure
      # -------------------------------------------------------------------------
      # Nightly regression failures are logged for investigation
      # This is non-blocking - just tracking, not gating
      # -------------------------------------------------------------------------
      - name: 🐛 Create Issue on Failure
        if: steps.nightly-run.outcome == 'failure'
        uses: actions/github-script@v7
        continue-on-error: true  # Don't fail the job if issue creation fails
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '🌙 Nightly Regression Failed - TEST Environment',
              body: 'Nightly regression tests failed in TEST environment. **Non-blocking - investigate when possible.**\n\n' +
                    '**Workflow:** ' + context.workflow + '\n' +
                    '**Run:** ' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + '\n\n' +
                    'Please review and triage. This does not block current development work.',
              labels: ['bug', 'nightly-regression', 'non-blocking']
            })

  # ===========================================================================
  # JOB 5: POST REPORT LINKS AS COMMENT
  # ===========================================================================
  # PURPOSE: Post direct links to Allure reports as GitHub comments
  # TRIGGER: Runs after all test jobs complete
  # SCOPE: Comments on PRs or commits with artifact links
  # GATE: NON-BLOCKING
  # ===========================================================================
  post-report-links:
    name: 💬 Post Report Links
    runs-on: ubuntu-latest
    timeout-minutes: 5
    needs: [smoke-dev, test-stage, smoke-prd, nightly-regression]
    if: always()

    steps:
      - name: 💬 Comment Report Links
        uses: actions/github-script@v7
        with:
          script: |
            const runId = context.runId;
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;

            let comment = `## 📊 Allure Test Reports\n\n`;
            comment += `**Workflow Run:** [View Details](${runUrl})\n\n`;
            comment += `### 📦 View Artifacts (No Download Required)\n\n`;
            comment += `Click any artifact below to view the Allure report directly in your browser:\n\n`;

            const jobs = ['smoke-dev', 'test-stage', 'smoke-prd', 'nightly-regression'];
            const jobResults = {
              'smoke-dev': '${{ needs.smoke-dev.result }}',
              'test-stage': '${{ needs.test-stage.result }}',
              'smoke-prd': '${{ needs.smoke-prd.result }}',
              'nightly-regression': '${{ needs.nightly-regression.result }}'
            };

            for (const job of jobs) {
              if (jobResults[job] !== 'skipped') {
                const artifactUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${runId}`;
                const status = jobResults[job] === 'success' ? '✅' : '❌';
                comment += `${status} **${job}:** [View Allure Report](${artifactUrl})\n`;
              }
            }

            comment += `\n### 🌐 GitHub Pages (Latest Report)\n\n`;
            comment += `📊 [Open Allure Dashboard](https://${{ github.repository_owner }}.github.io/${{ github.event.repository.name }}/)\n\n`;
            comment += `> 💡 **Tip:** Click on an artifact above, then click \`index.html\` to view the report without downloading!`;

            // Post as PR comment or commit comment
            if (context.eventName === 'pull_request') {
              const { data: comments } = await github.rest.issues.listComments({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: context.issue.number,
              });

              const botComment = comments.find(comment =>
                comment.user.type === 'Bot' &&
                comment.body.includes('## 📊 Allure Test Reports')
              );

              if (botComment) {
                await github.rest.issues.updateComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  comment_id: botComment.id,
                  body: comment
                });
              } else {
                await github.rest.issues.createComment({
                  owner: context.repo.owner,
                  repo: context.repo.repo,
                  issue_number: context.issue.number,
                  body: comment
                });
              }
            }

  # ===========================================================================
  # JOB 6: DEPLOY ALLURE REPORT TO GITHUB PAGES
  # ===========================================================================
  # PURPOSE: Deploy Allure test reports to GitHub Pages for a persistent dashboard
  # TRIGGER: Runs after all test jobs complete
  # SCOPE: Downloads all Allure results and generates unified dashboard
  # GATE: NON-BLOCKING - deployment failures don't affect test results
  # ===========================================================================
  deploy-allure-report:
    name: 📊 Deploy Allure Report
    runs-on: ubuntu-latest
    timeout-minutes: 10
    needs: [smoke-dev, test-stage, smoke-prd, nightly-regression]
    if: always() && (needs.smoke-dev.result == 'success' || needs.test-stage.result == 'success' || needs.smoke-prd.result == 'success' || needs.nightly-regression.result == 'success')

    steps:
      # -------------------------------------------------------------------------
      # STEP 1: Checkout repository
      # -------------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # STEP 2: Setup Node.js
      # -------------------------------------------------------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # -------------------------------------------------------------------------
      # STEP 3: Download all Allure results artifacts
      # -------------------------------------------------------------------------
      - name: 📥 Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-allure-results'
          path: allure-results/
          merge-multiple: true

      # -------------------------------------------------------------------------
      # STEP 4: Check if Allure results exist
      # -------------------------------------------------------------------------
      - name: 🔍 Check for Allure Results
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results 2>/dev/null)" ]; then
            echo "❌ No Allure results found to deploy"
            exit 0
          fi
          echo "✅ Found Allure results"
          ls -la allure-results/ | head -20

      # -------------------------------------------------------------------------
      # STEP 6: Install Allure CLI
      # -------------------------------------------------------------------------
      - name: 📦 Install Allure CLI
        run: |
          npm install -g allure-commandline
          allure --version

      # -------------------------------------------------------------------------
      # STEP 7: Generate Allure Report
      # -------------------------------------------------------------------------
      - name: 📈 Generate Allure Report
        run: |
          rm -rf allure-report
          allure generate allure-results -o allure-report
          echo "✅ Allure report generated"
          ls -la allure-report/ | head -10

      # -------------------------------------------------------------------------
      # STEP 8: Setup Pages
      # -------------------------------------------------------------------------
      - name: 🚀 Setup Pages
        uses: actions/configure-pages@v4

      # -------------------------------------------------------------------------
      # STEP 9: Upload artifact for GitHub Pages
      # -------------------------------------------------------------------------
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      # -------------------------------------------------------------------------
      # STEP 9: Deploy to GitHub Pages
      # -------------------------------------------------------------------------
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# =======================================================================================================
# PIPELINE SUMMARY
# =======================================================================================================
# JOB                  TRIGGER           ENV    SCOPE                     GATE        ACTION ON FAILURE
# -------------------------------------------------------------------------------------------------------
# smoke-dev            PR/push           DEV    @smoke only             Blocking      Block PR promotion
# test-stage           test branch       TEST   @smoke + @regression    Blocking      Log bug, block PRD
# smoke-prd            main branch       PRD    @smoke only             Blocking      Rollback PRD
# nightly-regression   Daily 2 AM        TEST   @regression             Non-block     Log bug for triage
# =======================================================================================================
#
# SMOKE TESTS (@smoke tag):
# • Login authentication (standard_user)
# • Inventory page loads and displays products
# • Add to cart functionality
# • Basic navigation (navbar, cart access)
# • Checkout flow (happy path)
#
# REGRESSION TESTS (@regression tag):
# • All smoke tests
# • All authentication scenarios (locked user, wrong password, etc.)
# • All inventory operations (sorting, filtering, all products)
# • All cart operations (add, remove, quantity, calculations)
# • All checkout steps (information, overview, complete)
# • All navigation components (navbar, sidebar, links)
# • All E2E critical paths
# • Form validation and error handling
# • Negative test scenarios
#
# =============================================================================
# USAGE NOTES
# =============================================================================
# To use the @regression tag, add it to relevant tests in your spec files:
#   test('should add item to cart @smoke @regression', async ({ ... }) => { })
#   test('should handle locked user @regression', async ({ ... }) => { })
#
# Tests can have multiple tags. For example:
# • @smoke only → Runs in all jobs (smoke-dev, test-stage, smoke-prd)
# • @regression only → Runs in nightly-regression and test-stage
# • @smoke @regression → Runs everywhere (smoke tests are always part of regression)
# =============================================================================

