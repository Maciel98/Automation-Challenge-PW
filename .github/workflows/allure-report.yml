# =============================================================================
# Allure Report Deployment to GitHub Pages
# =============================================================================
# This workflow deploys Allure test reports to GitHub Pages for a persistent
# dashboard that shows test history, trends, and detailed results.
#
# FEATURES:
# • Automatic deployment after test runs complete
# • Historical test data and trend analysis
# • Beautiful dashboard with graphs and filtering
# • Public URL for stakeholders to view results
# =============================================================================

name: Allure Report

on:
  # Deploy after any test workflow completes
  workflow_run:
    workflows: ['E2E Test Pipeline']
    types:
      - completed
  # Manual deployment trigger
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to make a GitHub Pages deployment
permissions:
  pages: write
  id-token: write
  contents: read

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # JOB: Deploy Allure Report to GitHub Pages
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -------------------------------------------------------------------------
      # STEP 1: Checkout repository
      # -------------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # STEP 2: Download Allure results from the test workflow
      # -------------------------------------------------------------------------
      - name: 📥 Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-allure-results'
          path: allure-results/
          merge-multiple: true

      # -------------------------------------------------------------------------
      # STEP 3: Download existing history (if any)
      # -------------------------------------------------------------------------
      - name: 📥 Download Previous History
        uses: actions/cache@v4
        with:
          path: allure-history
          key: allure-history-${{ github.run_id }}
          restore-keys: |
            allure-history-

      # -------------------------------------------------------------------------
      # STEP 4: Generate Allure Report with history
      # -------------------------------------------------------------------------
      - name: 📈 Generate Allure Report
        run: |
          npm install -g allure-commandline
          # Generate report with history support
          allure generate allure-results --clean -o allure-report --report-dir ./allure-report

      # -------------------------------------------------------------------------
      # STEP 5: Setup Pages
      # -------------------------------------------------------------------------
      - name: 🚀 Setup Pages
        uses: actions/configure-pages@v4

      # -------------------------------------------------------------------------
      # STEP 6: Upload artifact for GitHub Pages
      # -------------------------------------------------------------------------
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      # -------------------------------------------------------------------------
      # STEP 7: Deploy to GitHub Pages
      # -------------------------------------------------------------------------
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
# To enable GitHub Pages for your repository:
#
# 1. Go to Settings > Pages
# 2. Source: GitHub Actions
# 3. Your Allure dashboard will be available at:
#    https://<your-username>.github.io/<repository-name>/
#
# FEATURES:
# • Test history and trends over time
# • Filter by status, severity, suite, and more
# • Detailed test logs, screenshots, and traces
# • Compare builds and track flaky tests
# • Beautiful graphs and statistics
#
# NOTE: The first deployment may take a few minutes. Subsequent deployments
# will be faster and will maintain test history.
# =============================================================================
