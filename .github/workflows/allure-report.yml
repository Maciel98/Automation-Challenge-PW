# =============================================================================
# Allure Report Deployment to GitHub Pages
# =============================================================================
# This workflow deploys Allure test reports to GitHub Pages for a persistent
# dashboard that shows test history, trends, and detailed results.
#
# FEATURES:
# • Automatic deployment after test runs complete
# • Historical test data and trend analysis
# • Beautiful dashboard with graphs and filtering
# • Public URL for stakeholders to view results
# =============================================================================

name: Allure Report

on:
  # Deploy after any test workflow completes
  workflow_run:
    workflows: ['E2E Test Pipeline']
    types:
      - completed
  # Manual deployment trigger
  workflow_dispatch:

# Grant GITHUB_TOKEN the permissions required to make a GitHub Pages deployment
permissions:
  pages: write
  id-token: write
  contents: read

# Allow only one concurrent deployment
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  # ===========================================================================
  # JOB: Deploy Allure Report to GitHub Pages
  # ===========================================================================
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # -------------------------------------------------------------------------
      # STEP 1: Checkout repository
      # -------------------------------------------------------------------------
      - name: 📥 Checkout Repository
        uses: actions/checkout@v4

      # -------------------------------------------------------------------------
      # STEP 2: Download Allure results from the test workflow
      # -------------------------------------------------------------------------
      - name: 📥 Download Allure Results
        uses: actions/download-artifact@v4
        with:
          pattern: '*-allure-results'
          path: allure-results/
          merge-multiple: true

      # -------------------------------------------------------------------------
      # STEP 3: Setup Node.js
      # -------------------------------------------------------------------------
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*

      # -------------------------------------------------------------------------
      # STEP 4: Install Allure CLI
      # -------------------------------------------------------------------------
      - name: 📦 Install Allure CLI
        run: |
          echo "Installing Allure CLI..."
          npm install -g allure-commandline
          allure --version
          echo "✅ Allure CLI installed successfully"

      # -------------------------------------------------------------------------
      # STEP 5: Check if Allure results exist
      # -------------------------------------------------------------------------
      - name: 🔍 Check for Allure Results
        run: |
          if [ ! -d "allure-results" ] || [ -z "$(ls -A allure-results)" ]; then
            echo "❌ No Allure results found. Exiting gracefully."
            echo "ℹ️ This is normal if the test workflow hasn't run yet."
            exit 0
          fi
          echo "✅ Found Allure results"

      # -------------------------------------------------------------------------
      # STEP 6: Generate Allure Report
      # --------------------------------------------------------------------------
      - name: 📈 Generate Allure Report
        run: |
          echo "Generating Allure report..."
          ls -la allure-results/ | head -20
          allure generate allure-results --clean -o allure-report
          echo "✅ Allure report generated successfully"
          ls -la allure-report/

      # -------------------------------------------------------------------------
      # STEP 5: Setup Pages
      # -------------------------------------------------------------------------
      - name: 🚀 Setup Pages
        uses: actions/configure-pages@v4

      # -------------------------------------------------------------------------
      # STEP 6: Upload artifact for GitHub Pages
      # -------------------------------------------------------------------------
      - name: 📤 Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./allure-report

      # -------------------------------------------------------------------------
      # STEP 7: Deploy to GitHub Pages
      # -------------------------------------------------------------------------
      - name: 🚀 Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

# =============================================================================
# SETUP INSTRUCTIONS
# =============================================================================
# To enable GitHub Pages for your repository:
#
# 1. Go to Settings > Pages
# 2. Source: GitHub Actions
# 3. Your Allure dashboard will be available at:
#    https://<your-username>.github.io/<repository-name>/
#
# FEATURES:
# • Test history and trends over time
# • Filter by status, severity, suite, and more
# • Detailed test logs, screenshots, and traces
# • Compare builds and track flaky tests
# • Beautiful graphs and statistics
#
# NOTE: The first deployment may take a few minutes. Subsequent deployments
# will be faster and will maintain test history.
# =============================================================================
